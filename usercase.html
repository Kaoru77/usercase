<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Use Case Diagram — FLIXLY</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0F0F0F;
      color: #F0F0F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    h1 { font-size: 20px; color: #E8B74A; margin-bottom: 4px; }
    p  { font-size: 13px; color: #777; margin-bottom: 2rem; }

    svg text { font-family: 'DM Sans', sans-serif; }

    .print-btn {
      margin-top: 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 22px;
      border: 1.5px solid #E8B74A;
      border-radius: 8px;
      background: transparent;
      color: #E8B74A;
      cursor: pointer;
    }
    .print-btn:hover { background: rgba(232,183,74,.1); }
    @media print { body { background:#fff; color:#000; } .print-btn { display:none; } }
  </style>
</head>
<body>
  <h1>Use Case Diagram — FLIXLY</h1>
  <p>Website Movie Watchlist berbasis TMDB API</p>

  <svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#E8B74A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- ============ SISTEM BOUNDARY ============ -->
    <rect x="150" y="50" width="390" height="560" rx="14"
          fill="none" stroke="#2E2E2E" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="344" y="38" text-anchor="middle" font-size="11" fill="#666">«sistem»</text>
    <text x="344" y="72" text-anchor="middle" font-size="16" font-weight="700" fill="#F0F0F0">FLIXLY</text>

    <!-- ============ USE CASES ============ -->

    <!-- UC1: Lihat daftar film -->
    <ellipse cx="344" cy="120" rx="110" ry="24" fill="#0f2a2a" stroke="#1D9E75" stroke-width="1.2"/>
    <text x="344" y="120" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1D9E75">Lihat daftar film</text>

    <!-- UC2: Cari film -->
    <ellipse cx="344" cy="188" rx="95" ry="24" fill="#0f1a2e" stroke="#378ADD" stroke-width="1.2"/>
    <text x="344" y="188" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#378ADD">Cari film</text>

    <!-- UC3: Filter genre -->
    <ellipse cx="344" cy="256" rx="95" ry="24" fill="#0f1a2e" stroke="#378ADD" stroke-width="1.2"/>
    <text x="344" y="256" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#378ADD">Filter genre</text>

    <!-- UC4: Lihat detail film -->
    <ellipse cx="344" cy="330" rx="110" ry="24" fill="#1e1030" stroke="#7F77DD" stroke-width="1.2"/>
    <text x="344" y="330" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#9B6BE8">Lihat detail film</text>

    <!-- UC5: Simpan ke watchlist -->
    <ellipse cx="262" cy="415" rx="105" ry="24" fill="#2a1e00" stroke="#BA7517" stroke-width="1.2"/>
    <text x="262" y="415" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#EF9F27">Simpan ke watchlist</text>

    <!-- UC6: Hapus dari watchlist -->
    <ellipse cx="262" cy="490" rx="105" ry="24" fill="#2a1e00" stroke="#BA7517" stroke-width="1.2"/>
    <text x="262" y="490" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#EF9F27">Hapus dari watchlist</text>

    <!-- UC7: Lihat watchlist -->
    <ellipse cx="262" cy="560" rx="105" ry="24" fill="#2a1e00" stroke="#BA7517" stroke-width="1.2"/>
    <text x="262" y="560" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#EF9F27">Lihat watchlist</text>

    <!-- UC8: Pilih platform nonton -->
    <ellipse cx="430" cy="490" rx="108" ry="24" fill="#2a0e0e" stroke="#993C1D" stroke-width="1.2"/>
    <text x="430" y="490" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#D85A30">Pilih platform nonton</text>

    <!-- ============ AKTOR USER (kiri) ============ -->
    <circle cx="62" cy="320" r="20" fill="none" stroke="#aaa" stroke-width="1.5"/>
    <line x1="62" y1="340" x2="62" y2="390" stroke="#aaa" stroke-width="1.5"/>
    <line x1="30" y1="360" x2="94" y2="360" stroke="#aaa" stroke-width="1.5"/>
    <line x1="62" y1="390" x2="36" y2="425" stroke="#aaa" stroke-width="1.5"/>
    <line x1="62" y1="390" x2="88" y2="425" stroke="#aaa" stroke-width="1.5"/>
    <text x="62" y="445" text-anchor="middle" font-size="14" font-weight="600" fill="#F0F0F0">User</text>

    <!-- ============ RELASI USER ke USE CASE ============ -->
    <line x1="82" y1="308" x2="232" y2="124"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="315" x2="247" y2="191"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="322" x2="247" y2="258"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="330" x2="232" y2="330"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="340" x2="155" y2="415"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="348" x2="155" y2="487"  stroke="#555" stroke-width="1"/>
    <line x1="82" y1="355" x2="155" y2="557"  stroke="#555" stroke-width="1"/>

    <!-- ============ AKTOR TMDB (kanan bawah) ============ -->
    <rect x="568" y="280" width="100" height="120" rx="10"
          fill="none" stroke="#2E2E2E" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="618" y="272" text-anchor="middle" font-size="11" fill="#555">«eksternal»</text>

    <circle cx="618" cy="308" r="16" fill="none" stroke="#777" stroke-width="1.5"/>
    <line x1="618" y1="324" x2="618" y2="362" stroke="#777" stroke-width="1.5"/>
    <line x1="596" y1="342" x2="640" y2="342" stroke="#777" stroke-width="1.5"/>
    <line x1="618" y1="362" x2="600" y2="392" stroke="#777" stroke-width="1.5"/>
    <line x1="618" y1="362" x2="636" y2="392" stroke="#777" stroke-width="1.5"/>
    <text x="618" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#888">TMDB API</text>

    <!-- ============ «include» USE CASE -> TMDB ============ -->
    <line x1="454" y1="120" x2="598" y2="300"
          stroke="#E8B74A" stroke-width="0.8" stroke-dasharray="6 3" marker-end="url(#arr2)" opacity="0.6"/>
    <line x1="439" y1="188" x2="598" y2="305"
          stroke="#E8B74A" stroke-width="0.8" stroke-dasharray="6 3" marker-end="url(#arr2)" opacity="0.6"/>
    <line x1="439" y1="256" x2="598" y2="312"
          stroke="#E8B74A" stroke-width="0.8" stroke-dasharray="6 3" marker-end="url(#arr2)" opacity="0.6"/>
    <line x1="454" y1="330" x2="598" y2="318"
          stroke="#E8B74A" stroke-width="0.8" stroke-dasharray="6 3" marker-end="url(#arr2)" opacity="0.6"/>

    <!-- Label «include» -->
    <text x="534" y="218" text-anchor="middle" font-size="11" fill="#E8B74A" opacity="0.7">«include»</text>

    <!-- ============ «extend» dari Detail ke Simpan & Platform ============ -->
    <!-- Detail -> Simpan ke watchlist -->
    <line x1="290" y1="346" x2="262" y2="391"
          stroke="#9B6BE8" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arr)" opacity="0.8"/>
    <text x="252" y="370" text-anchor="end" font-size="11" fill="#9B6BE8" opacity="0.8">«extend»</text>

    <!-- Detail -> Pilih platform nonton -->
    <line x1="400" y1="346" x2="430" y2="466"
          stroke="#9B6BE8" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arr)" opacity="0.8"/>
    <text x="434" y="410" text-anchor="start" font-size="11" fill="#9B6BE8" opacity="0.8">«extend»</text>

    <!-- ============ LEGENDA ============ -->
    <rect x="152" y="592" width="386" height="50" rx="8" fill="#1a1a1a" stroke="#2E2E2E" stroke-width="1"/>
    <!-- Relasi langsung -->
    <line x1="170" y1="617" x2="205" y2="617" stroke="#555" stroke-width="1"/>
    <text x="212" y="617" dominant-baseline="central" font-size="11" fill="#888">Asosiasi (user–use case)</text>
    <!-- Include -->
    <line x1="330" y1="617" x2="365" y2="617" stroke="#E8B74A" stroke-width="0.8" stroke-dasharray="5 3"/>
    <text x="372" y="617" dominant-baseline="central" font-size="11" fill="#E8B74A">«include» / «extend»</text>
  </svg>

  <button class="print-btn" onclick="window.print()">🖨️ Print / Simpan PDF</button>
</body>
</html>
